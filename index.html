<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Spesial Untuk Caca 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLING --- */
        :root {
            --main-pink: #ffb6c1; /* LightPink */
            --dark-pink: #ff69b4; /* HotPink */
            --bg-color: #fff0f5; /* LavenderBlush */
            --text-color: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Animasi Background --- */
        body::before {
            content: "💖";
            position: fixed;
            top: -10%;
            left: 10%;
            font-size: 2rem;
            opacity: 0.2;
            animation: floatHearts 10s linear infinite;
            z-index: -1;
        }
        body::after {
            content: "✨";
            position: fixed;
            bottom: -10%;
            right: 10%;
            font-size: 2rem;
            opacity: 0.2;
            animation: floatHearts 12s linear infinite reverse;
            z-index: -1;
        }

        @keyframes floatHearts {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* --- Header --- */
        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 50px;
            animation: fadeInDown 1.5s ease;
        }

        header h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3rem;
            color: var(--dark-pink);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        header p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }

        /* --- Album Container --- */
        .album-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 60px;
        }

        /* --- Photo Card Styling (Efek Polaroid beranimasi) --- */
        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 300px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            position: relative;
            overflow: hidden;
        }

        /* Delay animasi untuk tiap kartu */
        .photo-card:nth-child(1) { animation-delay: 0.5s; transform: rotate(-3deg); }
        .photo-card:nth-child(2) { animation-delay: 1s; transform: rotate(2deg); }
        .photo-card:nth-child(3) { animation-delay: 1.5s; transform: rotate(-1deg); }

        .photo-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.3);
            z-index: 10;
        }

        .photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid #fdfdfd;
        }

        .photo-card .caption {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-pink);
            font-family: 'Pacifico', cursive;
        }

        /* Dekorasi Selotip estetik di atas foto */
        .photo-card::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 100px;
            height: 30px;
            background-color: rgba(255, 182, 193, 0.5); /* Semi-transparent pink tape */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 2;
        }

        /* --- Footer (Kata-kata Spesial) --- */
        footer {
            text-align: center;
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border: 2px solid var(--main-pink);
            animation: fadeIn 2s ease 2s forwards;
            opacity: 0;
        }

        footer p {
            font-size: 1.5rem;
            line-height: 1.6;
            color: var(--text-color);
            font-weight: 500;
        }

        footer span.highlight {
            color: var(--dark-pink);
            font-weight: 700;
            position: relative;
        }
        
        footer span.highlight::after {
            content: "💓";
            position: absolute;
            font-size: 1rem;
            top: -10px;
            right: -15px;
            animation: heartBeat 1.5s infinite;
        }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* --- Responsive Mobile --- */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .album-container { gap: 20px; }
            .photo-card { width: 90%; max-width: 320px; }
            footer p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Happy Moments</h1>
        <p>Special Album for My Bestie</p>
    </header>

    <div class="album-container">
        <div class="photo-card">
            <img src="https://autoresbot.com/tmp_files/5022f1e6-450b-42a6-ba2e-4c60b5a1f580.jpg" alt="Foto Bestie 1">
            <div class="caption">Memory One ✨</div>
        </div>

        <div class="photo-card">
            <img src="https://autoresbot.com/tmp_files/af34f1c0-3d81-43a0-980f-b6a7fadf70f4.jpg" alt="Foto Bestie 2">
            <div class="caption">Best Time ❤️</div>
        </div>

        <div class="photo-card">
            <img src="https://autoresbot.com/tmp_files/851349a5-001a-45a3-b0d7-cfd1e9d913b6.jpg" alt="Foto Bestie 3">
            <div class="caption">Always Together 🌸</div>
        </div>
    </div>

    <footer>
        <p>
            <span class="highlight">CACA ADALAH BEST FRIEND TERBAIK SAYA</span>, 
            SEMOGA SELALU JADI BEST FRIEND YAH. Luv u! 💖
        </p>
    </footer>

</body>
          </html>
